<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla On-Screen Keyboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>বাংলা অন-স্ক্রিন কীবোর্ড</h2>
        <textarea id="output" placeholder="এখানে লেখার জন্য নিচের কীবোর্ড ব্যবহার করুন..."></textarea>
        
        <div id="keyboard" class="keyboard">
            <div class="row">
                <button class="key" data-char="অ">অ</button>
                <button class="key" data-char="আ" data-variants="া">আ</button>
                <button class="key" data-char="ই" data-variants="ি">ই</button>
                <button class="key" data-char="ঈ" data-variants="ী">ঈ</button>
                <button class="key" data-char="উ" data-variants="ু">উ</button>
                <button class="key" data-char="ঊ" data-variants="ূ">ঊ</button>
                <button class="key" data-char="ঋ" data-variants="ৃ">ঋ</button>
                <button class="key" data-char="এ" data-variants="ে">এ</button>
                <button class="key" data-char="ঐ" data-variants="ৈ">ঐ</button>
                <button class="key" data-char="ও" data-variants="ো">ও</button>
                <button class="key" data-char="ঔ" data-variants="ৌ">ঔ</button>
            </div>
            
            <div class="row">
                <button class="key" data-char="ক" data-variants="ক্,কা,কি,কী">ক</button>
                <button class="key" data-char="খ" data-variants="খা,খি,খী">খ</button>
                <button class="key" data-char="গ" data-variants="গা,গি,গী">গ</button>
                <button class="key" data-char="ঘ">ঘ</button>
                <button class="key" data-char="ঙ">ঙ</button>
                <button class="key" data-char="চ">চ</button>
                <button class="key" data-char="ছ">ছ</button>
                <button class="key" data-char="জ" data-variants="জ্ঞ,জ্ব">জ</button>
                <button class="key" data-char="ঝ">ঝ</button>
                <button class="key" data-char="ঞ">ঞ</button>
            </div>

            <div class="row">
                <button class="key" data-char="ট">ট</button>
                <button class="key" data-char="ঠ">ঠ</button>
                <button class="key" data-char="ড">ড</button>
                <button class="key" data-char="ঢ">ঢ</button>
                <button class="key" data-char="ণ">ণ</button>
                <button class="key" data-char="ত" data-variants="ৎ,ত্ব,ত্তা">ত</button>
                <button class="key" data-char="থ">থ</button>
                <button class="key" data-char="দ" data-variants="দ্ব,দ্ধ">দ</button>
                <button class="key" data-char="ধ">ধ</button>
                <button class="key" data-char="ন">ন</button>
            </div>

            <div class="row">
                <button class="key" data-char="প">প</button>
                <button class="key" data-char="ফ">ফ</button>
                <button class="key" data-char="ব" data-variants="ব্ব,ব-ফলা">ব</button>
                <button class="key" data-char="ভ">ভ</button>
                <button class="key" data-char="ম">ম</button>
                <button class="key" data-char="য" data-variants="্য">য</button>
                <button class="key" data-char="র" data-variants="্র,র্">র</button>
                <button class="key" data-char="ল">ল</button>
                <button class="key" data-char="শ">শ</button>
                <button class="key" data-char="ষ">ষ</button>
            </div>

            <div class="row">
                <button class="key" data-char="স">স</button>
                <button class="key" data-char="হ">হ</button>
                <button class="key" data-char="ড়">ড়</button>
                <button class="key" data-char="ঢ়">ঢ়</button>
                <button class="key" data-char="য়">য়</button>
                <button class="key" data-char="ং">ং</button>
                <button class="key" data-char="ঃ">ঃ</button>
                <button class="key" data-char="ঁ">ঁ</button>
                <button class="control-key" id="space">Space</button>
                <button class="control-key" id="backspace">Backspace</button>
                <button class="control-key" id="clear">Clear</button>
            </div>
        </div>
    </div>

    <div id="popup-menu" class="popup-menu hidden"></div>

    <script src="script.js"></script>
</body>
</html>
